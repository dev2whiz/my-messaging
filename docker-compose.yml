version: "3.9"

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-msguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-msgpassword}
      POSTGRES_DB: ${POSTGRES_DB:-messaging}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msguser}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Valkey 8.x ────────────────────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── RabbitMQ 3.x ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Gateway (Go) ──────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Web (React/Vite) ──────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
  valkey_data:
  rabbitmq_data:
