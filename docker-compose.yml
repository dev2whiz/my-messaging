# my-messaging

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-msguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-msgpassword}
      POSTGRES_DB: ${POSTGRES_DB:-messaging}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msguser}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Valkey 8.x ────────────────────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── RabbitMQ 3.x ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── DB Migrations ─────────────────────────────────────────
  migrate:
    image: migrate/migrate:v4.18.1
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-msguser}:${POSTGRES_PASSWORD:-msgpassword}@postgres:5432/${POSTGRES_DB:-messaging}?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  # ── Gateway (Spring Boot) ─────────────────────────────────
  gateway:
    build:
      context: ./services/gateway-spring
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-msguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-msgpassword}
      POSTGRES_DB: ${POSTGRES_DB:-messaging}
      VALKEY_HOST: ${VALKEY_HOST:-valkey}
      VALKEY_PORT: ${VALKEY_PORT:-6379}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      JWT_SECRET: ${JWT_SECRET:-supersecretkeythatisatleast32byteslong}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Web (React/Vite) ──────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
  valkey_data:
  rabbitmq_data:
